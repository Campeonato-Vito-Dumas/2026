<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campeonato Vito Dumas 2026</title>
    
    <link rel="icon" type="image/png" href="favicon.png?v=3">
    
    <link rel="apple-touch-icon" href="favicon.png?v=3">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Vito Dumas">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #003366; text-align: center; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 30px; }
        
        .tabs { display: flex; justify-content: center; gap: 5px; margin-bottom: 25px; border-bottom: 2px solid #eee; flex-wrap: wrap; }
        .tab-btn { padding: 12px 20px; border: none; background: none; cursor: pointer; font-size: 16px; color: #888; font-weight: 500; transition: 0.3s; border-bottom: 3px solid transparent; }
        .tab-btn:hover { color: #005b96; background: #f0f5f9; }
        .tab-btn.active { color: #005b96; border-bottom: 3px solid #005b96; font-weight: bold; }

        .content { display: none; overflow-x: auto; }
        .content.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 500px; }
        th { background-color: #003366; color: white; padding: 15px 12px; text-align: left; font-size: 0.9em; }
        td { padding: 12px; border-bottom: 1px solid #edf2f7; font-size: 0.95em; }
        tr:nth-child(even) { background-color: #fcfdfe; }
        tr:hover { background-color: #f1f5f9; }

        .error-msg { color: #d9534f; font-weight: bold; padding: 20px; text-align: center; border: 1px solid #d9534f; border-radius: 8px; background: #fff5f5; }
        #loading-indicator { text-align: center; color: #666; font-style: italic; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Campeonato Vito Dumas 2026</h1>
    <div id="loading-indicator">Cargando posiciones...</div>
    <div id="status"></div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'General')">General</button>
        <button class="tab-btn" onclick="openTab(event, 'SerieA')">Serie A</button>
        <button class="tab-btn" onclick="openTab(event, 'SerieB')">Serie B</button>
        <button class="tab-btn" onclick="openTab(event, 'SerieC')">Serie C</button>
    </div>

    <div id="General" class="content active">
        <table id="table-General"><thead><tr id="head-General"></tr></thead><tbody></tbody></table>
    </div>
    <div id="SerieA" class="content">
        <table id="table-SerieA"><thead><tr id="head-SerieA"></tr></thead><tbody></tbody></table>
    </div>
    <div id="SerieB" class="content">
        <table id="table-SerieB"><thead><tr id="head-SerieB"></tr></thead><tbody></tbody></table>
    </div>
    <div id="SerieC" class="content">
        <table id="table-SerieC"><thead><tr id="head-SerieC"></tr></thead><tbody></tbody></table>
    </div>
</div>

<script>
    const SHEET_ID = '1w2EHN7ujpacckhvw8ok0I4HWtu1r63UNWF9zI_-Rh6o'; 

    function openTab(evt, tabName) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        if(evt) evt.currentTarget.classList.add('active');
    }

    async function cargarDatos() {
        const statusDiv = document.getElementById('status');
        const loader = document.getElementById('loading-indicator');
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=xlsx`;
        
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('Error de conexión con la planilla.');
            
            const arrayBuffer = await response.arrayBuffer();
            const workbook = XLSX.read(new Uint8Array(arrayBuffer), {type: 'array'});

            const sheetsMap = {
                "General": "General",
                "Serie A": "SerieA",
                "Serie B": "SerieB",
                "Serie C": "SerieC"
            };

            let tablasEncontradas = 0;
            for (const [nombreExcel, idHTML] of Object.entries(sheetsMap)) {
                if (procesarHoja(workbook, nombreExcel, idHTML)) {
                    tablasEncontradas++;
                }
            }

            loader.style.display = 'none';
            if (tablasEncontradas === 0) {
                statusDiv.innerHTML = `<div class="error-msg">⚠️ No se encontraron las pestañas en el Excel.</div>`;
            }

        } catch (error) {
            loader.style.display = 'none';
            statusDiv.innerHTML = `<div class="error-msg">⚠️ Error al cargar datos.</div>`;
            console.error(error);
        }
    }

    function procesarHoja(workbook, nombreHojaExcel, idDestino) {
        const sheet = workbook.Sheets[nombreHojaExcel];
        if (!sheet) return false;

        const json = XLSX.utils.sheet_to_json(sheet);
        const tbody = document.querySelector(`#table-${idDestino} tbody`);
        const theadRow = document.getElementById(`head-${idDestino}`);
        
        if (!tbody || !theadRow) return false;
        
        tbody.innerHTML = "";
        theadRow.innerHTML = "";

        if (json.length > 0) {
            Object.keys(json[0]).forEach(key => {
                theadRow.innerHTML += `<th>${key}</th>`;
            });

            json.forEach(fila => {
                let rowHtml = "<tr>";
                Object.keys(json[0]).forEach(key => {
                    rowHtml += `<td>${fila[key] !== undefined ? fila[key] : ''}</td>`;
                });
                rowHtml += "</tr>";
                tbody.innerHTML += rowHtml;
            });
            return true;
        }
        return false;
    }

    window.onload = cargarDatos;
</script>

</body>
</html>
